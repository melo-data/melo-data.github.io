<audio id="audio-player" src="" class="hidden"></audio>

<script>
    let currentMode = ''; 
    let currentMemoTab = 'saved'; // 'saved' または 'history'
    let currentQuery = '';
    const MAX_FETCH_LIMIT = 200; 
    let isFetching = false;
    let allFetchedResults = []; 
    let displayLimit = 0; 
    const CHUNK_SIZE = 20; 
    let currentTrackData = null; 
    let currentPlayingUrl = null;
    let observer;
    let deferredPrompt; // PWAインストールプロンプト用

    // PWA: インストールダイアログのイベントを捕捉
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    document.addEventListener('DOMContentLoaded', () => {
        const sentinel = document.getElementById('scroll-sentinel');
        observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && displayLimit < allFetchedResults.length) {
                loadMoreRender(); 
            }
        }, { root: document.getElementById('search-results'), threshold: 0.1 });
        observer.observe(sentinel);
        
        document.getElementById('audio-player').addEventListener('ended', stopAudio);
        
        // LINE SDK LIFF初期化（LINEミニアプリ化への備え）
        if (typeof liff !== 'undefined') {
            liff.init({ liffId: "YOUR_LIFF_ID_HERE" }).then(() => {
                console.log("LIFF Initialized");
            }).catch(err => {
                console.log("LIFF Initialization failed", err);
            });
        }

        // 音声入力非対応ブラウザの場合はボタンを非表示
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            const voiceBtn = document.getElementById('btn-voice-input');
            if (voiceBtn) voiceBtn.style.display = 'none';
        }
    });

    function tryFullScreen() {
        const docEl = document.documentElement;
        const requestFS = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (requestFS) {
                requestFS.call(docEl).catch(err => { console.log("Full-screen API error", err); });
            }
        }
    }

    function showToast(message) {
        const toast = document.getElementById('toast-message');
        document.getElementById('toast-text').textContent = message;
        toast.classList.remove('opacity-0');
        toast.classList.add('opacity-100');
        setTimeout(() => {
            toast.classList.remove('opacity-100');
            toast.classList.add('opacity-0');
        }, 3000);
    }

    function shareApp() {
        if (deferredPrompt) {
            // Android / Chrome等: 保存しておいたインストールプロンプトを表示
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
            });
        } else {
            // iOS Safariなど自動プロンプトが非対応の場合の案内
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                showToast("ブラウザ下部の共有メニュー[↑]から「ホーム画面に追加」を行ってください");
            } else {
                showToast("ブラウザのメニュー(⋮)から「ホーム画面に追加」を行ってください");
            }
        }
    }

    function goToSearch(mode) {
        tryFullScreen();
        currentMode = mode;
        document.getElementById('page-top').style.display = 'none';
        document.getElementById('page-search').style.display = 'flex';
        document.getElementById('memo-header-buttons').classList.add('hidden'); // メモ切り替えは隠す
        
        const titleEl = document.getElementById('search-title');
        const inputEl = document.getElementById('search-input');
        inputEl.value = '';
        clearResults();
        
        if (mode === 'artist') { titleEl.textContent = '歌手名で探す'; inputEl.placeholder = '歌手名を入力'; } 
        else if (mode === 'song') { titleEl.textContent = '曲名で探す'; inputEl.placeholder = '曲名を入力'; } 
        else if (mode === 'album') { titleEl.textContent = 'アルバム名で探す'; inputEl.placeholder = 'アルバム名を入力'; } 
        else if (mode === 'lyrics') { titleEl.textContent = '歌詞ワードで探す'; inputEl.placeholder = '歌詞の一部を入力'; }

        // 検索履歴の描画
        renderSearchHistory(mode);

        // 画面切り替え後に確実にフォーカスを当ててキーボードを起動させる
        setTimeout(() => {
            inputEl.focus();
        }, 150);
    }

    function goToMemo() {
        tryFullScreen();
        currentMode = 'memo';
        currentMemoTab = 'saved';
        document.getElementById('page-top').style.display = 'none';
        document.getElementById('page-search').style.display = 'flex';
        document.getElementById('search-title').textContent = 'メモ帳 (保存した曲)';
        document.getElementById('search-input').parentElement.style.display = 'none';
        document.getElementById('sort-select').parentElement.style.display = 'none';
        
        // メモ帳・履歴の切り替えボタン群を表示
        document.getElementById('memo-header-buttons').classList.remove('hidden');
        updateMemoTabUI();

    function executeSearch(isNewSearch = false) {
        if (isNewSearch) {
            currentQuery = document.getElementById('search-input').value.trim();
            if (!currentQuery) return;
            allFetchedResults = [];
            clearResults();
            if (typeof saveSearchQuery === 'function') {
                saveSearchQuery(currentQuery, currentMode);
            }
            // 検索実行後にテキスト欄をクリア
            document.getElementById('search-input').value = '';
        }
        if (isFetching) return;
        isFetching = true;
        document.getElementById('loading-indicator').style.display = 'block';
        
        let url = `https://itunes.apple.com/search?term=${encodeURIComponent(currentQuery)}&country=jp&lang=ja_jp&limit=${MAX_FETCH_LIMIT}`;
        if (currentMode === 'artist') url += `&entity=song&attribute=artistTerm`;
        else if (currentMode === 'song') url += `&entity=song&attribute=songTerm`;
        else if (currentMode === 'album') url += `&entity=album`;
        else if (currentMode === 'lyrics') url += `&entity=song`;
        
        fetchJSONP(url, (data) => {
            isFetching = false;
            document.getElementById('loading-indicator').style.display = 'none';
            if (data && data.results) {
                if (currentMode === 'artist') {
                    allFetchedResults = groupToArtists(data.results);
                } else if (currentMode === 'album') {
                    allFetchedResults = data.results;
                } else {
                    allFetchedResults = groupConsolidatedSongs(data.results);
                }
                applySortAndRender();
            }
        });
    }

    function calculateSingleScore(track) {
        let score = 0;
        const collName = (track.collectionName || '').toLowerCase();
        const trkName = (track.trackName || '').toLowerCase();

        const cleanCollName = collName.replace(/\[.*?\]|\(.*?\)/g, '').replace(/-\s*single|-\s*ep/g, '').trim();
        const cleanTrkName = trkName.replace(/\[.*?\]|\(.*?\)/g, '').trim();
        if (cleanCollName === cleanTrkName && cleanTrkName.length > 0) {
            score += 100;
        }

        if (collName.includes('single') || collName.includes('シングル')) {
            score += 50;
        }

        if (/ベスト|全曲集|名曲|決定盤|究極|コレクション|best|collection|特盛|パック/i.test(collName)) {
            score -= 80;
        }
        
        return score;
    }

    function groupConsolidatedSongs(results) {
        const map = {};
        const normalizeTitle = (t) => t.replace(/\[.*?\]|\(.*?\)/g, '').trim().toLowerCase();
        
        results.forEach(song => {
            if(song.wrapperType !== 'track') return;
            const baseName = normalizeTitle(song.trackName);
            const key = `${song.artistName}_${baseName}`;
            
            if (!map[key]) {
                map[key] = { ...song, versions: [song] };
            } else {
                map[key].versions.push(song);
            }
        });

        Object.keys(map).forEach(key => {
            const group = map[key];
            
            group.versions.forEach(v => {
                v.displayYear = extractDisplayYear(v);
                v.singleScore = calculateSingleScore(v);
            });

            group.versions.sort((a, b) => {
                const yearA = a.displayYear === '不明' ? 9999 : parseInt(a.displayYear);
                const yearB = b.displayYear === '不明' ? 9999 : parseInt(b.displayYear);
                if (yearA !== yearB) return yearA - yearB;
                
                if (b.singleScore !== a.singleScore) return b.singleScore - a.singleScore;
                
                return new Date(a.releaseDate || 0) - new Date(b.releaseDate || 0);
            });

            const bestVersion = group.versions[0];
            map[key] = { ...bestVersion, versions: group.versions };
        });

        return Object.values(map);
    }

    function groupToArtists(songResults) {
        const artistMap = {};
        songResults.forEach(song => {
            const id = song.artistId;
            if (!id) return;
            if (!artistMap[id]) {
                artistMap[id] = { isArtistGroup: true, artistId: id, artistName: song.artistName, primaryGenreName: song.primaryGenreName, artworkUrl100: song.artworkUrl100, trackCount: 0 };
            }
            artistMap[id].trackCount++;
        });
        return Object.values(artistMap);
    }

    function extractDisplayYear(track) {
        const title = (track.collectionName || track.trackName || '');
        const yearMatch = title.match(/(?:19|20)\d{2}/);
        if (yearMatch) return yearMatch[0];
        
        const isBestAlbum = /ベスト|全曲集|名曲|決定盤|究極|コレクション|best|collection|特盛|パック/i.test(title);
        if (isBestAlbum) return '不明';
        
        if (track.releaseDate) return new Date(track.releaseDate).getFullYear().toString();
        return '不明';
    }

    function applySortAndRender() {
        const sortType = document.getElementById('sort-select').value;
        if (sortType === 'recent') allFetchedResults.sort((a, b) => new Date(b.releaseDate || 0) - new Date(a.releaseDate || 0));
        else if (sortType === 'aiueo') allFetchedResults.sort((a, b) => (a.trackName || a.collectionName || a.artistName || '').localeCompare((b.trackName || b.collectionName || b.artistName || ''), 'ja'));
        
        document.getElementById('result-count').textContent = `ヒット: ${allFetchedResults.length}件`;
        displayLimit = 0;
        document.getElementById('results-container').innerHTML = ''; 
        
        if(allFetchedResults.length === 0) {
            document.getElementById('results-container').innerHTML = '<div class="text-center p-8 text-gray-500">見つかりませんでした。</div>';
        } else {
            loadMoreRender(); 
        }
    }

    function loadMoreRender() {
        const container = document.getElementById('results-container');
        const end = Math.min(displayLimit + CHUNK_SIZE, allFetchedResults.length);
        
        for (let i = displayLimit; i < end; i++) {
            const item = allFetchedResults[i];
            const isArtist = item.isArtistGroup;
            const isAlbum = item.wrapperType === 'collection' || currentMode === 'album';
            
            const year = extractDisplayYear(item);
            const yearStr = year !== '不明' ? ` (${year})` : '';
            const title = (isArtist ? item.artistName : (isAlbum ? item.collectionName : item.trackName)) + (isArtist ? '' : yearStr);
            
            let subText = '';
            if(isArtist) subText = `${item.primaryGenreName || 'ジャンル不明'} | 取得: ${item.trackCount}曲`;
            else subText = item.artistName || '不明';

            const imgUrl = item.artworkUrl100 ? item.artworkUrl100.replace('100x100bb', '200x200bb') : '';
            const el = document.createElement('div');
            
            let rightHtml = '';
            if (!isArtist && !isAlbum && item.previewUrl) {
                const isPlaying = (currentPlayingUrl === item.previewUrl);
                rightHtml = `<div class="border-l border-gray-100 pl-2"><button onclick="toggleInlineAudio('${item.previewUrl}', this, event)" class="play-btn-wrapper bg-indigo-50 text-indigo-600 active:bg-indigo-200"><span class="material-icons">${isPlaying ? 'stop' : 'play_arrow'}</span></button></div>`;
            }

            const innerContent = `
                <div class="flex-1 flex items-center min-w-0 py-2 px-2 cursor-pointer w-full" onclick="handleItemClick(${isArtist}, ${isAlbum}, ${i})">
                    <img src="${imgUrl}" class="${isArtist ? 'w-16 h-16 object-cover rounded-full' : 'w-16 h-16 object-cover rounded'} mr-3 border border-gray-200" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22 bg=%22%23eee%22%3E%3C/svg%3E'">
                    <div class="flex-1 min-w-0 pr-2">
                        <div class="text-base font-bold text-gray-900 truncate leading-tight">${title}</div>
                        <div class="text-sm text-gray-600 truncate mt-1">${subText}</div>
                    </div>
                </div>
                ${rightHtml}
            `;

            if (currentMode === 'memo') {
                let deleteAction = '';
                if (currentMemoTab === 'saved') {
                    deleteAction = `onclick="removeMemo(${item.trackId})"`;
                } else {
                    deleteAction = `onclick="removeHistory(${item.trackId})"`;
                }

                el.className = 'rounded-lg mb-2 mt-1 overflow-hidden shadow-sm border border-gray-200 bg-white'; 
                el.innerHTML = `
                    <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar w-full" style="scroll-snap-type: x mandatory;">
                        <div class="w-full shrink-0 snap-start flex items-center bg-white active:bg-gray-50">
                            ${innerContent}
                        </div>
                        <button ${deleteAction} class="w-20 shrink-0 snap-start bg-red-500 text-white flex flex-col items-center justify-center active:bg-red-600 transition-colors outline-none">
                            <span class="material-icons text-2xl pointer-events-none">delete</span>
                            <span class="text-[10px] mt-1 pointer-events-none">削除</span>
                        </button>
                    </div>
                `;
            } else {
                el.className = 'bg-white rounded-lg shadow-sm flex items-center mb-2 mt-1 active:bg-gray-50 border border-gray-200 pr-2';
                el.innerHTML = innerContent;
            }
            container.appendChild(el);
        }
        displayLimit = end;
    }

        if (item.versions && item.versions.length > 0) {
            item.versions.forEach(v => {
                v.displayYear = extractDisplayYear(v);
                v.sortYear = v.displayYear === '不明' ? 9999 : parseInt(v.displayYear);
            });
            
            const sortedVersions = [...item.versions].sort((a,b) => {
                if (a.sortYear !== b.sortYear) return a.sortYear - b.sortYear;
                return b.singleScore - a.singleScore;
            });
            
            sortedVersions.forEach((v, idx) => {
                const div = document.createElement('div');
                div.className = idx >= 3 ? 'hidden accordion-timeline' : ''; 
                const yearStr = v.displayYear === '不明' ? '不明' : `${v.displayYear}年`;

        }

        fetchWikipediaInfo(item);
        document.getElementById('modal-detail').classList.add('active');
    }

    function fetchWikipediaInfo(item) {
        const artistName = item.artistName;
        const cleanTitle = item.trackName.replace(/\[.*?\]|\(.*?\)/g, '').trim();

        // 1. 曲のWiki
        const songArea = document.getElementById('wiki-song-area');
        songArea.classList.remove('hidden');
        document.getElementById('wiki-song-text').textContent = '読み込み中...';
        document.getElementById('wiki-song-more-btn').classList.add('hidden');
        
        fetchWikiData(cleanTitle, (text) => {
            if (text && !text.includes("曖昧さ回避")) {
                setupAccordion('wiki-song-text', 'wiki-song-more-btn', text);
            } else {
                fetchWikiData(cleanTitle + ' (' + artistName + 'の曲)', (text2) => {
                    if (text2) setupAccordion('wiki-song-text', 'wiki-song-more-btn', text2);
                    else songArea.classList.add('hidden'); 
                });
            }
        });

        // 2. アーティストのWiki
        const artistArea = document.getElementById('wiki-artist-area');
        artistArea.classList.remove('hidden');
        document.getElementById('wiki-text').textContent = '読み込み中...';
        document.getElementById('wiki-more-btn').classList.add('hidden');
        document.getElementById('wiki-link').href = '#';

        fetchWikiData(artistName, (text) => {
            if (text) {
                setupAccordion('wiki-text', 'wiki-more-btn', text);
                document.getElementById('wiki-link').href = `https://ja.wikipedia.org/wiki/${encodeURIComponent(artistName)}`;
            } else {
                document.getElementById('wiki-text').textContent = '情報が見つかりませんでした。';
            }
        });
    }

    function fetchWikiData(query, callback) {
        fetch(`https://ja.wikipedia.org/w/api.php?format=json&action=query&prop=extracts&explaintext&redirects=1&titles=${encodeURIComponent(query)}&origin=*&exchars=800`)
            .then(res => res.json())
            .then(data => {
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                if (pageId !== "-1" && pages[pageId].extract) callback(pages[pageId].extract);
                else callback(null);
            }).catch(() => callback(null));
    }

    function setupAccordion(textId, btnId, fullText) {
        const textEl = document.getElementById(textId);
        const btnEl = document.getElementById(btnId);
        
        textEl.textContent = fullText;
        textEl.classList.add('line-clamp-5');
        
        setTimeout(() => {
            if (textEl.scrollHeight > textEl.clientHeight) {
                btnEl.classList.remove('hidden');
                btnEl.textContent = '▼ 続きを読む';
                btnEl.onclick = () => {
                    const isExpanded = !textEl.classList.contains('line-clamp-5');
                    if (isExpanded) {
                        textEl.classList.add('line-clamp-5');
                        btnEl.textContent = '▼ 続きを読む';
                    } else {
                        textEl.classList.remove('line-clamp-5');
                        btnEl.textContent = '▲ 閉じる';
                    }
                };
            }
        }, 50);
    }

    // 検索履歴の保存（最大5件）
    function saveSearchQuery(query, mode) {
        if (!query || mode === 'memo' || mode.includes('-')) return;
        const key = `search_history_${mode}`;
        let history = JSON.parse(localStorage.getItem(key)) || [];
        history = history.filter(q => q !== query); // 重複削除
        history.unshift(query); // 先頭に追加
        if (history.length > 5) history = history.slice(0, 5); // 最大5件に制限
        localStorage.setItem(key, JSON.stringify(history));
        renderSearchHistory(mode);
    }

    // 検索履歴のチップ（ボタン）を描画
    function renderSearchHistory(mode) {
        const container = document.getElementById('search-history-container');
        if (!container) return;
        if (mode === 'memo' || mode.includes('-')) {
            container.classList.add('hidden');
            return;
        }

        const key = `search_history_${mode}`;
        let history = JSON.parse(localStorage.getItem(key)) || [];
        
        if (history.length === 0) {
            container.classList.add('hidden');
            container.innerHTML = '';
            return;
        }
        
        container.classList.remove('hidden');
        container.innerHTML = '';
        history.forEach(query => {
            const btn = document.createElement('button');
            btn.className = 'bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full text-xs font-bold border border-indigo-200 active:bg-indigo-200 truncate max-w-[120px] shadow-sm outline-none';
            btn.textContent = query;
            btn.onclick = () => {
                document.getElementById('search-input').value = query;
                executeSearch(true);
            };
            container.appendChild(btn);
        });
    }

            icon.textContent = 'stop'; text.textContent = '停止';

            icon.textContent = 'play_circle'; text.textContent = '30秒試聴';

    function getMemoList() { try { return JSON.parse(localStorage.getItem('merodata_memos')) || []; } catch(e) { return []; } }
    
    function toggleMemo() {
        if (!currentTrackData) return;
        let memos = getMemoList();
        const idx = memos.findIndex(m => m.trackId === currentTrackData.trackId);
        if (idx >= 0) memos.splice(idx, 1);
        else memos.push(currentTrackData);
        localStorage.setItem('merodata_memos', JSON.stringify(memos));
        updateMemoIcon(currentTrackData.trackId);
    }
    
    function removeMemo(trackId) {
        let memos = getMemoList();
        memos = memos.filter(m => m.trackId !== trackId);
        localStorage.setItem('merodata_memos', JSON.stringify(memos));
        loadMemoList();
        showToast("削除しました");
    }
    
    function updateMemoIcon(trackId) {
        const icon = document.getElementById('icon-modal-memo');
        if (getMemoList().find(m => m.trackId === trackId)) { icon.textContent = 'favorite'; icon.classList.add('text-red-500'); }
        else { icon.textContent = 'favorite_border'; icon.classList.remove('text-red-500'); }
    }
    
    function loadMemoList() { allFetchedResults = getMemoList(); applySortAndRender(); }

    // 閲覧履歴（LocalStorage最大10件）の操作
    function getHistoryList() { try { return JSON.parse(localStorage.getItem('merodata_history')) || []; } catch(e) { return []; } }

    function addHistoryItem(item) {
        let history = getHistoryList();
        // 同一曲があれば先に削除して最新にする
        history = history.filter(h => h.trackId !== item.trackId);
        // 先頭に追加
        history.unshift(item);
        // 最大10件制限
        if (history.length > 10) {
            history = history.slice(0, 10);
        }
        localStorage.setItem('merodata_history', JSON.stringify(history));
    }

    function removeHistory(trackId) {
        let history = getHistoryList();
        history = history.filter(h => h.trackId !== trackId);
        localStorage.setItem('merodata_history', JSON.stringify(history));
        loadHistoryList();
        showToast("履歴から削除しました");
    }

    function loadHistoryList() { allFetchedResults = getHistoryList(); applySortAndRender(); }
    
    function shareSong() {
        if (!currentTrackData) return;
        const text = `${currentTrackData.trackName} / ${currentTrackData.artistName}\n#メロ出〜た`;
        if (navigator.share) navigator.share({ title: '曲の共有', text: text }).catch(console.error);
        else showToast("共有機能がサポートされていません");
    }

    function fetchJSONP(url, callback) {
        const cbName = 'jsonp_cb_' + Math.round(100000 * Math.random());
        window[cbName] = (data) => { delete window[cbName]; document.body.removeChild(script); callback(data); };
        const script = document.createElement('script');
        script.src = url + '&callback=' + cbName;
        script.onerror = () => { isFetching = false; document.getElementById('loading-indicator').style.display = 'none'; showToast("通信エラーが発生しました"); };
        document.body.appendChild(script);
    }

    function startVoiceInput() {
        if (!('webkitSpeechRecognition' in window)) { showToast('音声入力未対応のブラウザです'); return; }
        const rec = new webkitSpeechRecognition();
        rec.lang = 'ja-JP';
        rec.onresult = (e) => { document.getElementById('search-input').value = e.results[0][0].transcript; executeSearch(true); };
        rec.start();
    }
</script>
</body>
</html>
