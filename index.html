<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#5a5ce6">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link class="pwa-manifest" rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoi44Oh44Ot5Ye644O844GfIiwic2hvcnRfbmFtZSI6IuODoeODreWHuuO-veOBnyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiNmM2Y0ZjYiLCJ0aGVtZV9jb2xvciI6IiM1YTVjZTYifQ==">
    
    <title>メロ出〜た</title>
    <!-- OGP・共有紹介文の完全同期 -->
    <meta property="og:title" content="メロ出〜た">
    <meta property="og:description" content="無料で30秒試聴できます！カラオケの曲を探そうにもタイトルも分からず、アーティスト名も分からず、聴きたくてもすぐに出てこずといった時に。">
    <meta property="og:image" content="https://melo-data.github.io/img/melodata_opg.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="./img/melodata_fav.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./img/melodata_opg.png">

    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FY401ERBMD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FY401ERBMD');
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2269983310123890" crossorigin="anonymous"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- LINEミニアプリ用 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <!-- YouTube IFrame Player API（動画埋め込み検索用） -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        html { font-size: 16px !important; -webkit-text-size-adjust: 100%; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #f3f4f6; color: #333; overflow: hidden; }
        .screen-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; background-color: #f3f4f6; max-width: 600px; margin: 0 auto; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .screen-container-white { background-color: #ffffff; }
        .scrollable-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
        
        .modal { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { transition: transform 0.3s ease; transform: translateY(100%); }
        .modal.active .modal-content { transform: translateY(0); }
        
        .fab-back { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            width: 60px; 
            height: 60px; 
            background-color: #ff9999;
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            z-index: 50; 
        }
        .top-header { background-color: #5a5ce6; color: white; padding: 2rem 1.5rem 2.5rem 1.5rem; text-align: center; border-bottom-left-radius: 1.5rem; border-bottom-right-radius: 1.5rem; margin-bottom: 1.5rem; position: relative; }
        .play-btn-wrapper { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .line-clamp-5 {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        #search-options-accordion {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
        }

        /* ブラウザタブ風UI用 CSS */
        .genre-tab-container {
            border-bottom: 2px solid #a5b4fc; /* indigo-300 */
        }
        .genre-tab {
            border: 2px solid transparent;
        }
        .genre-tab.active {
            background-color: #f5f3ff; /* violet-50 */
            color: #4338ca; /* indigo-700 */
            border-color: #a5b4fc; /* indigo-300 */
            border-bottom-color: #f5f3ff;
            margin-bottom: -2px; /* 下ボーダーに重ねる */
            z-index: 10;
        }
        .genre-tab:not(.active) {
            background-color: rgba(255, 255, 255, 0.15);
            color: #e0e7ff; /* indigo-100 */
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div id="page-top" class="screen-container">
    <div class="top-header shadow-md">
        <!-- シェア兼インストール促進ボタン -->
        <button onclick="shareApp()" class="absolute top-4 right-4 text-white p-2 rounded-full bg-white/20 active:bg-white/30 backdrop-blur-sm transition">
            <span class="material-icons">add_to_home_screen</span>
        </button>
        <h1 class="text-3xl font-bold tracking-wider flex items-center justify-center mb-1 mt-4 font-sans">
            <span class="material-icons text-3xl mr-2">mic</span> メロ出〜た
        </h1>
        <div class="text-[11px] text-indigo-100 text-right opacity-80 mb-4 pr-1 tracking-wider">produced by M.Tsuda</div>
        
        <!-- アプリ紹介文の完全同期 -->
        <p class="text-[15px] leading-relaxed text-indigo-100 opacity-90 text-left">
            無料で30秒試聴できます！カラオケの曲を探そうにもタイトルも分からず、アーティスト名も分からず、聴きたくてもすぐに出てこずといった時に。
        </p>
    </div>
    
    <div class="scrollable-content px-4 flex flex-col">
        <!-- 2列グリッドエリア（歌手名・曲名 ＆ 新曲：余白を統一しつつ、正円をコンパクトに変更） -->
        <div class="grid grid-cols-12 gap-4 mb-4 items-stretch">
            <div class="col-span-7 flex flex-col gap-4">
                <!-- 歌手名 -->
                <button onclick="goToSearch('artist')" class="w-full bg-white rounded-2xl shadow-sm flex items-center p-0 overflow-hidden active:bg-gray-50 border border-transparent active:border-gray-200 transition-all h-[90px]">
                    <div class="w-2 h-full bg-blue-500 self-stretch flex-shrink-0"></div>
                    <div class="p-3 flex-1 flex items-center justify-between min-w-0">
                        <div class="flex items-center min-w-0">
                            <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center mr-3 flex-shrink-0">
                                <span class="material-icons text-2xl">person</span>
                            </div>
                            <div class="text-left min-w-0">
                                <div class="text-lg font-bold text-gray-800 truncate">歌手名</div>
                                <div class="text-[11px] text-gray-500 mt-0.5 truncate">歌手名から探す</div>
                            </div>
                        </div>
                        <span class="material-icons text-gray-300">chevron_right</span>
                    </div>
                </button>

                <!-- 曲名 -->
                <button onclick="goToSearch('song')" class="w-full bg-white rounded-2xl shadow-sm flex items-center p-0 overflow-hidden active:bg-gray-50 border border-transparent active:border-gray-200 transition-all h-[90px]">
                    <div class="w-2 h-full bg-green-500 self-stretch flex-shrink-0"></div>
                    <div class="p-3 flex-1 flex items-center justify-between min-w-0">
                        <div class="flex items-center min-w-0">
                            <div class="w-12 h-12 rounded-full bg-green-100 text-green-500 flex items-center justify-center mr-3 flex-shrink-0">
                                <span class="material-icons text-2xl">music_note</span>
                            </div>
                            <div class="text-left min-w-0">
                                <div class="text-lg font-bold text-gray-800 truncate">曲名</div>
                                <div class="text-[11px] text-gray-500 mt-0.5 truncate">曲名から探す</div>
                            </div>
                        </div>
                        <span class="material-icons text-gray-300">chevron_right</span>
                    </div>
                </button>
            </div>

            <!-- 新曲 (ご要望通り正円枠サイズを小さく抑えつつ、中のアイコン・文字サイズを際立たせて強調) -->
            <div class="col-span-5 flex items-center justify-center">
                <button onclick="goToSearch('new-song')" class="w-[140px] h-[140px] rounded-full border-[6px] border-[#8b5cf6] bg-white flex flex-col items-center justify-center p-3 shadow-md hover:shadow-lg active:scale-95 transition-all duration-150 outline-none relative">
                    <!-- 内側アイコン (他より大きいw-12の薄紫背景 ＆ 強調NEWバッジ) -->
                    <div class="w-12 h-12 rounded-full bg-[#f3e8ff] flex items-center justify-center mb-1 flex-shrink-0 shadow-inner">
                        <span class="text-[11px] font-black text-[#8b5cf6] border-[2px] border-[#a78bfa] rounded px-1 scale-110 tracking-tighter">NEW</span>
                    </div>
                    <!-- 文字サイズを他カード(text-lg)より大きく設定 -->
                    <span class="text-xl font-black text-gray-800 leading-tight">新曲</span>
                    <span class="text-[10px] text-gray-400 mt-0.5 whitespace-nowrap">新曲を探す</span>
                </button>
            </div>
        </div>

        <!-- アルバム名 -->
        <button onclick="goToSearch('album')" class="w-full bg-white rounded-2xl shadow-sm flex items-center p-0 overflow-hidden mb-4 active:bg-gray-50 border border-transparent active:border-gray-200 transition-all h-[90px]">
            <div class="w-2 h-full bg-yellow-500 self-stretch flex-shrink-0"></div>
            <div class="p-3 flex-1 flex items-center justify-between min-w-0">
                <div class="flex items-center min-w-0">
                    <div class="w-12 h-12 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center mr-3 flex-shrink-0">
                        <span class="material-icons text-2xl">album</span>
                    </div>
                    <div class="text-left min-w-0">
                        <div class="text-lg font-bold text-gray-800 truncate">アルバム名</div>
                        <div class="text-[11px] text-gray-500 mt-0.5 truncate">アルバムから探す</div>
                    </div>
                </div>
                <span class="material-icons text-gray-300">chevron_right</span>
            </div>
        </button>

        <!-- 歌詞ワード -->
        <button onclick="goToSearch('lyrics')" class="w-full bg-white rounded-2xl shadow-sm flex items-center p-0 overflow-hidden mb-4 active:bg-gray-50 border border-transparent active:border-gray-200 transition-all h-[90px]">
            <div class="w-2 h-full bg-pink-500 self-stretch flex-shrink-0"></div>
            <div class="p-3 flex-1 flex items-center justify-between min-w-0">
                <div class="flex items-center min-w-0">
                    <div class="w-12 h-12 rounded-full bg-pink-100 text-pink-500 flex items-center justify-center mr-3 flex-shrink-0">
                        <span class="material-icons text-2xl">menu_book</span>
                    </div>
                    <div class="text-left min-w-0">
                        <div class="text-lg font-bold text-gray-800 truncate">歌詞ワード</div>
                        <div class="text-[11px] text-gray-500 mt-0.5 truncate">歌詞の一部から探す</div>
                    </div>
                </div>
                <span class="material-icons text-gray-300">chevron_right</span>
            </div>
        </button>

        <!-- メモ帳 (ダークテーマ) -->
        <button onclick="goToMemo()" class="w-full bg-[#2a303c] rounded-2xl shadow-sm flex items-center p-0 overflow-hidden mb-8 active:bg-gray-800 transition-all h-[90px]">
            <div class="p-3 flex-1 flex items-center justify-between min-w-0 text-white">
                <div class="flex items-center min-w-0">
                    <div class="w-12 h-12 rounded-full bg-gray-600 text-white flex items-center justify-center mr-3 flex-shrink-0">
                        <span class="material-icons text-2xl">assignment</span>
                    </div>
                    <div class="text-left min-w-0">
                        <div class="text-lg font-bold truncate">メモ帳</div>
                        <div class="text-[11px] text-gray-300 mt-0.5 truncate">保存・閲覧履歴を見る</div>
                    </div>
                </div>
                <span class="material-icons text-gray-400">chevron_right</span>
            </div>
        </button>
    </div>
</div>

<div id="page-search" class="screen-container screen-container-white" style="display: none;">
    <div class="bg-[#5a5ce6] text-white p-3 shadow-md flex flex-col z-10 shrink-0">
        <div class="flex justify-between items-center mb-2">
            <h2 id="search-title" class="text-xl font-bold">検索</h2>
            <div id="memo-header-buttons" class="hidden flex space-x-1">
                <!-- 「保存」「履歴」トグル：ジャンルタブと同じく、非アクティブ時の文字が絶対に埋もれない配色設計 -->
                <button id="btn-toggle-saved" onclick="showSavedList()" class="bg-violet-50 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-bold border border-indigo-300 flex items-center shadow transition-all duration-150">
                    <span class="material-icons text-sm mr-1">favorite</span>保存
                </button>
                <button id="btn-toggle-history" onclick="showHistoryList()" class="bg-white/15 text-indigo-100 px-3 py-1.5 rounded-lg text-sm border border-transparent flex items-center transition-all duration-150">
                    <span class="material-icons text-sm mr-1">history</span>履歴
                </button>
            </div>
        </div>
        
        <div id="search-input-container" class="flex items-center bg-white rounded-lg p-1 shadow-inner border border-gray-200 relative z-20">
            <input type="text" id="search-input" placeholder="ここに入力..." class="flex-1 p-2 text-black text-lg outline-none rounded-l-lg bg-transparent w-full" onkeypress="if(event.key === 'Enter') executeSearch(true)" onfocus="openSearchOptions()">
            
            <div class="flex space-x-1 pl-1">
                <button id="btn-voice-input" onclick="startVoiceInput()" class="flex items-center justify-center bg-pink-50 text-pink-600 px-3 py-2 rounded-md font-bold text-sm active:bg-pink-100 transition-colors border border-pink-200 whitespace-nowrap">
                    <span class="material-icons mr-1 text-base">mic</span>音声
                </button>
                <button onclick="executeSearch(true)" class="flex items-center justify-center bg-[#5a5ce6] text-white px-3 py-2 rounded-md font-bold text-sm active:bg-indigo-700 transition-colors whitespace-nowrap">
                    <span class="material-icons mr-1 text-base">search</span>検索
                </button>
            </div>
        </div>

        <div id="search-history-container" class="flex flex-wrap gap-2 mt-2 px-1 hidden max-h-24 overflow-y-auto"></div>

        <!-- 歌手名・アルバム名用のシンプルソート -->
        <div id="simple-options-container" class="flex justify-between items-center mt-2 text-sm px-1" style="display: none;">
            <select id="sort-select-simple" class="bg-indigo-500 text-white border border-indigo-400 rounded p-1.5 outline-none font-medium" onchange="applyFiltersAndRender()">
                <option value="default">表示順：ヒット順</option>
                <option value="recent">表示順：新しい順</option>
                <option value="aiueo">表示順：五十音順</option>
            </select>
            <span id="result-count-simple" class="text-indigo-200 text-xs font-bold tracking-wider"></span>
        </div>

        <!-- 曲名・歌詞ワード・新曲用のアコーディオン検索オプション -->
        <div id="accordion-options-container" style="display: none;">
            <div id="search-options-accordion" class="overflow-hidden max-h-0 opacity-0 relative z-10 transition-all duration-300">
                <div class="flex space-x-2 mt-2 text-sm px-1">
                    <select id="sort-select-accordion" class="flex-1 bg-indigo-500 text-white border border-indigo-400 rounded p-1.5 outline-none font-medium" onchange="applyFiltersAndRender()">
                        <option value="default">表示順：ヒット順</option>
                        <option value="recent">表示順：新しい順</option>
                        <option value="aiueo">表示順：五十音順</option>
                    </select>
                    <select id="decade-select" class="flex-1 bg-indigo-500 text-white border border-indigo-400 rounded p-1.5 outline-none font-medium" onchange="applyFiltersAndRender()">
                        <option value="all">全ての年代</option>
                        <option value="2020">2020年代</option>
                        <option value="2010">2010年代</option>
                        <option value="2000">2000年代</option>
                        <option value="1990">1990年代</option>
                        <option value="1980">1980年代</option>
                        <option value="1970">1970年代</option>
                        <option value="1960">1960年代</option>
                    </select>
                </div>
                
                <!-- ブラウザタブ風ジャンル選択 -->
                <div class="mt-3 px-1">
                    <div class="flex overflow-x-auto hide-scrollbar space-x-1 genre-tab-container relative pt-1 px-1" id="genre-tabs">
                        <button onclick="selectGenre('all', this)" class="genre-tab active shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold relative transition-colors">すべて</button>
                        <button onclick="selectGenre('enka', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">演歌・民謡</button>
                        <button onclick="selectGenre('kayo', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">歌謡曲</button>
                        <button onclick="selectGenre('folk', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">フォーク</button>
                        <button onclick="selectGenre('rockpop', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">ロック・ポップ</button>
                        <button onclick="selectGenre('duet', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">デュエット</button>
                        <button onclick="selectGenre('anime', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">アニソン</button>
                        <button onclick="selectGenre('jazz', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">ジャズ等</button>
                        <button onclick="selectGenre('other', this)" class="genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold transition-colors">その他</button>
                    </div>
                </div>
            </div>

            <!-- オプション開閉ボタン ＆ ヒット数 -->
            <div class="flex justify-between items-center mt-1 pt-1 border-t border-indigo-400/30 px-1">
                <span id="result-count-accordion" class="text-indigo-200 text-xs font-bold tracking-wider"></span>
                <button id="accordion-toggle-btn" onclick="toggleSearchOptions()" class="text-white flex items-center justify-center px-3 py-1 rounded-full active:bg-indigo-600 outline-none transition-colors bg-indigo-500/50">
                    <span class="text-xs mr-1">検索オプション</span>
                    <span id="accordion-icon" class="material-icons text-sm">expand_more</span>
                </button>
            </div>
        </div>
    </div>

    <div id="search-results" class="scrollable-content bg-gray-100 p-2 relative">
        <div id="results-container" class="space-y-0"></div>
        <div id="loading-indicator" class="text-center p-4 text-gray-500 hidden">
            <span class="material-icons animate-spin">refresh</span> 読み込み中...
        </div>
        <div id="scroll-sentinel" class="h-10"></div>
    </div>

    <button onclick="goBackToTop()" class="fab-back">
        <span class="material-icons text-3xl">arrow_back</span>
    </button>
</div>

<div id="modal-detail" class="modal fixed inset-0 z-40 flex flex-col justify-end">
    <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeDetailModal()"></div>
    <div class="modal-content bg-white w-full h-[95%] rounded-t-2xl flex flex-col relative z-10 max-w-[600px] mx-auto">
        <div class="flex justify-between items-center p-3 border-b bg-gray-50 rounded-t-2xl shrink-0">
            <div class="flex space-x-2">
                <button id="btn-modal-memo" onclick="toggleMemo()" class="flex flex-col items-center justify-center p-2 text-gray-600 active:bg-gray-200 rounded">
                    <span id="icon-modal-memo" class="material-icons text-2xl">favorite_border</span>
                    <span class="text-[10px] mt-1">保存</span>
                </button>
                <button onclick="shareSong()" class="flex flex-col items-center justify-center p-2 text-gray-600 active:bg-gray-200 rounded">
                    <span class="material-icons text-2xl">share</span>
                    <span class="text-[10px] mt-1">共有</span>
                </button>
                <button onclick="searchDAMDirect()" class="flex flex-col items-center justify-center p-2 text-gray-600 active:bg-gray-200 rounded">
                    <span class="material-icons text-2xl">mic</span>
                    <span class="text-[10px] mt-1">DAM</span>
                </button>
            </div>
            <button onclick="closeDetailModal()" class="p-2 bg-gray-200 rounded-full text-gray-600 active:bg-gray-300">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-5 pb-8">
            <div class="flex flex-col items-center text-center">
                <img id="detail-img" src="" alt="ジャケット" class="w-48 h-48 object-cover rounded-lg shadow-lg mb-4 bg-gray-200">
                <h2 id="detail-title" class="text-2xl font-bold text-gray-900 leading-tight"></h2>
                <button id="detail-artist-btn" onclick="searchArtistFromDetail()" class="text-lg text-indigo-600 mt-2 font-bold cursor-pointer active:text-indigo-800 underline decoration-indigo-300 underline-offset-4 outline-none"></button>
            </div>

            <!-- ボタンエリア（2列配置） -->
            <div class="grid grid-cols-2 gap-3">
                <!-- 1行目: 試聴 ＆ 歌詞を見る(直接外部起動) -->
                <button id="btn-modal-play" onclick="playPreviewInModal()" class="bg-indigo-100 text-indigo-700 border border-indigo-300 py-3 rounded-lg font-bold flex items-center justify-center active:bg-indigo-200 transition-colors">
                    <span id="icon-modal-play" class="material-icons mr-1">play_circle</span>
                    <span id="text-modal-play">30秒試聴</span>
                </button>
                <button id="btn-lyrics" onclick="openLyricsDirect()" class="bg-indigo-100 text-indigo-700 border border-indigo-300 py-3 rounded-lg font-bold flex items-center justify-center active:bg-indigo-200 transition-colors">
                    <span class="material-icons mr-1">menu_book</span>歌詞を見る

        const params = new URLSearchParams(window.location.search);
        let trackId = params.get('trackId');
        
        // LINE内リダイレクト(liff.state)からパラメータ復元を試みる
        if (!trackId) {
            const liffState = params.get('liff.state');
            if (liffState) {
                try {
                    const decodedState = decodeURIComponent(liffState);
                    const stateParams = new URLSearchParams(decodedState.replace(/^\/?\?/, '?'));
                    trackId = stateParams.get('trackId');
                } catch (e) {
                    console.error("Failed to parse liff.state", e);
                }
            }
        }
        return trackId;
    }

    function customShare(title, text, url) {
        const fullShareText = text + "\n" + url;
        const shareData = { title, text: fullShareText, url };
        if (navigator.share) {
            navigator.share(shareData).catch((err) => {
                fallbackShare(fullShareText);
            });
        } else {
            fallbackShare(fullShareText);
        }
    }

    function fallbackShare(textStr) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(textStr).then(() => {
                showToast("共有リンクをコピーしました");
            }).catch(() => { fallbackCopyTextToClipboard(textStr); });
        } else {
            fallbackCopyTextToClipboard(textStr);
        }
    }

    function fallbackCopyTextToClipboard(textStr) {
        const textArea = document.createElement("textarea");
        textArea.value = textStr;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showToast("共有リンクをコピーしました");
        } catch (err) {
            showToast("コピーに失敗しました");
        }
        document.body.removeChild(textArea);
    }

    function calculateSingleScore(track) {
        let score = 0;
        const collName = (track.collectionName || '').toLowerCase();
        const trkName = (track.trackName || '').toLowerCase();

        const cleanCollName = collName.replace(/\[.*?\]|\(.*?\)/g, '').replace(/-\s*single|-\s*ep/g, '').trim();
        const cleanTrkName = trkName.replace(/\[.*?\]|\(.*?\)/g, '').trim();

        const isSingle = (cleanCollName === cleanTrkName && cleanTrkName.length > 0) || 
                         collName.includes('single') || collName.includes('シングル') || collName.includes('- ep');
                     
        const isBest = /ベスト|全曲集|名曲|決定盤|究極|コレクション|best|collection|greatest|hits|選集|精選/i.test(collName);

        if (isSingle) {
            score = 200; 
        } else if (!isBest) {
            score = 100; 
        } else {
            score = 0;   
        }
        
        return score;
    }

    function groupConsolidatedSongs(results) {
        const map = {};
        const normalizeTitle = (t) => t.replace(/\[.*?\]|\(.*?\)/g, '').trim().toLowerCase();
        
        results.forEach(song => {
            if(song.wrapperType !== 'track') return;
            const baseName = normalizeTitle(song.trackName);
            const key = `${song.artistName}_${baseName}`;
            
            if (!map[key]) {
                map[key] = { ...song, versions: [song] };
            } else {
                map[key].versions.push(song);
            }
        });

        Object.keys(map).forEach(key => {
            const group = map[key];
            
            group.versions.forEach(v => {
                v.displayYear = extractDisplayYear(v);
                v.singleScore = calculateSingleScore(v);
            });

            group.versions.sort((a, b) => {
                if (b.singleScore !== a.singleScore) {
                    return b.singleScore - a.singleScore; 
                }
                const dateA = new Date(a.releaseDate || 0);
                const dateB = new Date(b.releaseDate || 0);
                return dateA - dateB; 
            });

            const bestVersion = group.versions[0];
            
            let minYear = 9999;
            group.versions.forEach(v => {
                const y = parseInt(v.displayYear);
                if (!isNaN(y) && y < minYear) {
                    minYear = y;
                }
            });
            
            const finalDisplayYear = minYear === 9999 ? '不明' : minYear.toString();
            
            map[key] = { 
                ...bestVersion, 
                displayYear: finalDisplayYear,
                versions: group.versions 
            };
        });

        return Object.values(map);
    }

    function extractDisplayYear(track) {
        const title = (track.collectionName || track.trackName || '');
        const yearMatch = title.match(/(?:19|20)\d{2}/);
        if (yearMatch) return yearMatch[0];
        
        const isBestAlbum = /ベスト|全曲集|名曲|決定盤|究極|コレクション|best|collection|greatest|hits|選集|精選/i.test(title);
        if (isBestAlbum) return '不明';
        
        if (track.releaseDate) return new Date(track.releaseDate).getFullYear().toString();
        return '不明';
    }

        currentGenre = genre;
        document.querySelectorAll('.genre-tab').forEach(el => {
            el.className = 'genre-tab shrink-0 px-4 py-1.5 rounded-t-lg text-sm font-bold bg-white/15 text-indigo-100 border-2 border-transparent transition-colors';
        });
        if (btn) {

        }
        if (allFetchedResults.length > 0) applyFiltersAndRender();

    function applyFiltersAndRender() {
        let filtered = [...allFetchedResults];
        
        const isAccordionActive = (currentMode === 'song' || currentMode === 'lyrics' || currentMode === 'artist-songs' || currentMode === 'album-tracks' || currentMode === 'new-song');
        const sortSelectId = isAccordionActive ? 'sort-select-accordion' : 'sort-select-simple';
        let sortType = document.getElementById(sortSelectId) ? document.getElementById(sortSelectId).value : 'default';

        // 新曲検索モードの初期ソート
        if (currentMode === 'new-song' && sortType === 'default') {
            sortType = 'recent';
        }

        if (isAccordionActive) {
            const decade = document.getElementById('decade-select').value;
            if (decade !== 'all') {
                const startYear = parseInt(decade);
                const endYear = startYear + 9;
                filtered = filtered.filter(item => {
                    let yearNum = NaN;
                    if (item.displayYear && item.displayYear !== '不明') {
                        yearNum = parseInt(item.displayYear);
                    }
                    if (isNaN(yearNum) && item.releaseDate) {
                        yearNum = new Date(item.releaseDate).getFullYear();
                    }
                    if (isNaN(yearNum)) return false;
                    return yearNum >= startYear && yearNum <= endYear;
                });
            }

            if (currentGenre !== 'all') {
                filtered = filtered.filter(item => {
                    const genre = (item.primaryGenreName || '').toLowerCase();
                    switch (currentGenre) {
                        case 'enka': return genre.includes('演歌') || genre.includes('民謡') || genre.includes('enka');
                        case 'kayo': return genre.includes('歌謡曲') || genre.includes('kayokyoku');
                        case 'folk': return genre.includes('フォーク') || genre.includes('folk');
                        case 'rockpop': return genre.includes('ポップ') || genre.includes('pop') || genre.includes('ロック') || genre.includes('rock') || genre.includes('j-pop');
                        case 'duet': return genre.includes('デュエット') || genre.includes('duet');
                        case 'anime': return genre.includes('アニメ') || genre.includes('anime');
                        case 'jazz': return genre.includes('ジャズ') || genre.includes('jazz') || genre.includes('クラシック') || genre.includes('classic');
                        case 'other': return true; 
                        default: return true;
                    }
                });

                if (currentGenre === 'other') {
                    const known = ['演歌', '民謡', 'enka', '歌謡曲', 'kayokyoku', 'フォーク', 'folk', 'ポップ', 'pop', 'ロック', 'rock', 'j-pop', 'デュエット', 'duet', 'アニメ', 'anime', 'ジャズ', 'jazz', 'クラシック', 'classic'];
                    filtered = filtered.filter(item => {
                        const genre = (item.primaryGenreName || '').toLowerCase();
                        return !known.some(k => genre.includes(k));
                    });
                }
            }
        }

        if (sortType === 'recent') {
            filtered.sort((a, b) => new Date(b.releaseDate || 0) - new Date(a.releaseDate || 0));
        } else if (sortType === 'aiueo') {
            filtered.sort((a, b) => (a.trackName || a.collectionName || a.artistName || '').localeCompare((b.trackName || b.collectionName || b.artistName || ''), 'ja'));
        }

        displayResults = filtered;
        
        if (isAccordionActive) {
            document.getElementById('result-count-accordion').textContent = `ヒット: ${displayResults.length}件`;
        } else {
            document.getElementById('result-count-simple').textContent = `ヒット: ${displayResults.length}件`;
        }
        
        displayLimit = 0;
        document.getElementById('results-container').innerHTML = ''; 
        
        if(displayResults.length === 0) {
            document.getElementById('results-container').innerHTML = '<div class="text-center p-8 text-gray-500">条件に合う項目が見つかりませんでした。</div>';
        } else {
            loadMoreRender(); 
        }
    }

    function groupToArtists(songResults) {
        const artistMap = {};
        songResults.forEach(song => {
            const id = song.artistId;
            if (!id) return;
            if (!artistMap[id]) {
                artistMap[id] = { isArtistGroup: true, artistId: id, artistName: song.artistName, primaryGenreName: song.primaryGenreName, artworkUrl100: song.artworkUrl100, trackCount: 0 };
            }
            artistMap[id].trackCount++;
        });
        return Object.values(artistMap);
    }

    function loadMoreRender() {
        const container = document.getElementById('results-container');
        const end = Math.min(displayLimit + CHUNK_SIZE, displayResults.length);
        
        for (let i = displayLimit; i < end; i++) {
            const item = displayResults[i];
            const isArtist = item.isArtistGroup;
            const isAlbum = item.wrapperType === 'collection' || currentMode === 'album';
            
            const year = isArtist ? '' : (item.displayYear || extractDisplayYear(item));
            const yearStr = (year && year !== '不明') ? ` (${year})` : '';
            const title = (isArtist ? item.artistName : (isAlbum ? item.collectionName : item.trackName)) + yearStr;
            
            let subText = '';
            if(isArtist) subText = `${item.primaryGenreName || 'ジャンル不明'} | 取得: ${item.trackCount}曲`;
            else subText = item.artistName || '不明';

            const imgUrl = item.artworkUrl100 ? item.artworkUrl100.replace('100x100bb', '200x200bb') : '';
            const el = document.createElement('div');
            
            let rightHtml = '';
            if (!isArtist && !isAlbum && item.previewUrl) {
                const isPlaying = (currentPlayingUrl === item.previewUrl);
                rightHtml = `<div class="border-l border-gray-100 pl-2"><button onclick="toggleInlineAudio('${item.previewUrl}', this, event)" class="play-btn-wrapper bg-indigo-50 text-indigo-600 active:bg-indigo-200"><span class="material-icons">${isPlaying ? 'stop' : 'play_arrow'}</span></button></div>`;
            }

            const innerContent = `
                <div class="flex-1 flex items-center min-w-0 py-2 px-2 cursor-pointer w-full" onclick="handleItemClick(${isArtist ? 'true':'false'}, ${isAlbum ? 'true':'false'}, ${i})">
                    <img src="${imgUrl}" class="${isArtist ? 'w-16 h-16 object-cover rounded-full' : 'w-16 h-16 object-cover rounded'} mr-3 border border-gray-200" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22 bg=%22%23eee%22%3E%3C/svg%3E'">
                    <div class="flex-1 min-w-0 pr-2">
                        <div class="text-base font-bold text-gray-900 truncate leading-tight">${title}</div>
                        <div class="text-sm text-gray-600 truncate mt-1">${subText}</div>
                    </div>
                </div>
                ${rightHtml}
            `;

            if (currentMode === 'memo' && currentMemoTab === 'saved') {
                el.className = 'rounded-lg mb-2 mt-1 overflow-hidden shadow-sm border border-gray-200 bg-white'; 
                el.innerHTML = `
                    <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar w-full" style="scroll-snap-type: x mandatory;">
                        <div class="w-full shrink-0 snap-start flex items-center bg-white active:bg-gray-50">
                            ${innerContent}
                        </div>
                        <button onclick="removeMemo(${item.trackId})" class="w-20 shrink-0 snap-start bg-red-500 text-white flex flex-col items-center justify-center active:bg-red-600 transition-colors outline-none">
                            <span class="material-icons text-2xl pointer-events-none">delete</span>
                            <span class="text-[10px] mt-1 pointer-events-none">削除</span>
                        </button>
                    </div>
                `;
            } else {
                el.className = 'bg-white rounded-lg shadow-sm flex items-center mb-2 mt-1 active:bg-gray-50 border border-gray-200 pr-2';
                el.innerHTML = innerContent;
            }
            
            container.appendChild(el);
        }
        displayLimit = end;
    }

        const item = displayResults[index];
        if (isArtist) fetchArtistSongs(item.artistId, item.artistName);
        else if (isAlbum) fetchAlbumTracks(item.collectionId, item.collectionName);
        else openDetailModal(item);

    function toggleInlineAudio(url, btnElement, event) {
        event.stopPropagation();
        const audio = document.getElementById('audio-player');
        if (currentPlayingUrl === url && !audio.paused) { 
            stopAudio(); 
            return; 
        }
        stopAudio();
        audio.src = url;
        audio.play().catch(e => console.log(e));
        currentPlayingUrl = url;
        btnElement.querySelector('.material-icons').textContent = 'stop';
    }

    function stopAudio() {
        const audio = document.getElementById('audio-player');
        audio.pause();
        currentPlayingUrl = null;
        document.querySelectorAll('.play-btn-wrapper').forEach(btn => btn.querySelector('.material-icons').textContent = 'play_arrow');

    function searchCDOnRakuten(title, artist) {
        const cdButton = document.getElementById('btn-rakuten-cd');
        if (!cdButton) return;

        const myToken = ++rakutenSearchToken;
        currentRakutenUrl = '';
        setRakutenButtonState('loading');

        const cleanTitle = getCleanTitle(title);
        const cleanArtist = (artist || '').split(' - ')[0].split('　')[0].trim();

        if (!cleanTitle && !cleanArtist) {
            setRakutenButtonState('notfound');
            return;
        }

        // 楽天ブックスCD検索API 正式リクエストURL（ドメインは openapi.rakuten.co.jp が正。
        // app.rakuten.co.jp は本APIでは存在しないため通信が必ず失敗し「CD未検出」になっていました）
        const url = 'https://openapi.rakuten.co.jp/services/api/BooksCD/Search/20170404?' +
                    'applicationId=' + encodeURIComponent(RAKUTEN_APP_ID) +
                    '&accessKey=' + encodeURIComponent(RAKUTEN_ACCESS_KEY) +
                    '&affiliateId=' + encodeURIComponent(RAKUTEN_AFFILIATE_ID) +
                    '&title=' + encodeURIComponent(cleanTitle) +
                    '&artistName=' + encodeURIComponent(cleanArtist) +
                    '&hits=1' +
                    '&format=json';

        const timeoutId = setTimeout(() => {
            if (myToken === rakutenSearchToken) setRakutenButtonState('notfound');
        }, 8000);

        fetchJSONPSilent(url, (data) => {
            clearTimeout(timeoutId);
            if (myToken !== rakutenSearchToken) return;

            console.log("楽天ブックスCD検索 応答:", data);

            if (data && data.error) {
                console.warn("[楽天ブックスCD検索] APIエラー:", data.error, data.error_description);
                setRakutenButtonState('notfound');
                return;
            }

            const items = (data && (data.Items || data.items)) || [];
            const first = items[0];
            const rItem = first && (first.Item || first.item || first);
            const purchaseUrl = rItem && (rItem.affiliateUrl || rItem.itemUrl);

            if (purchaseUrl) {
                currentRakutenUrl = purchaseUrl;
                setRakutenButtonState('found');
            } else {
                setRakutenButtonState('notfound');
            }
        }, () => {
            clearTimeout(timeoutId);
            if (myToken === rakutenSearchToken) {
                console.warn('[楽天ブックスCD検索] 通信エラーが発生しました');
                setRakutenButtonState('notfound');
            }
        });
    }

    function setRakutenButtonState(state) {
        const cdButton = document.getElementById('btn-rakuten-cd');
        if (!cdButton) return;
        if (state === 'found') {
            cdButton.className = 'bg-[#ff9999] text-white py-3 rounded-lg font-bold flex items-center justify-center active:bg-[#ff8080] cursor-pointer transition-colors shadow-sm';
            cdButton.disabled = false;
            cdButton.innerHTML = '<span class="material-icons mr-1">album</span>音楽CDを購入';
        } else if (state === 'loading') {
            cdButton.className = 'bg-gray-300 text-gray-500 py-3 rounded-lg font-bold flex items-center justify-center cursor-not-allowed shadow-sm transition-all';
            cdButton.disabled = true;
            cdButton.innerHTML = '<span class="material-icons mr-1 animate-spin text-base">refresh</span>検索中...';
        } else {
            cdButton.className = 'bg-gray-300 text-gray-500 py-3 rounded-lg font-bold flex items-center justify-center cursor-not-allowed shadow-sm transition-all';
            cdButton.disabled = true;
            cdButton.innerHTML = '<span class="material-icons mr-1">album</span>CD未検出';
        }
    }

    function searchAndEmbedYouTube(title, artist) {
        const myToken = ++ytSearchToken;

        const wrapper = document.getElementById('yt-embed-wrapper');
        const fallback = document.getElementById('yt-container');
        if (wrapper) wrapper.classList.add('hidden');
        if (fallback) fallback.classList.remove('hidden');

        if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY.length < 30) {
            return; // APIキー未設定・プレースホルダーのままの場合は検索せず、外部起動カードのみ表示
        }

        const cleanTitle = getCleanTitle(title);
        const query = (cleanTitle + ' ' + (artist || '')).trim();
        if (!query) return;

        const cacheKey = 'merodata_ytcache_' + query;
        try {
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                const cachedId = JSON.parse(cached).videoId;
                if (cachedId) { embedYouTubeVideo(cachedId, myToken); return; }
                if (cachedId === null) return; 
            }
        } catch (e) {}

        const url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=1&q=' +
                    encodeURIComponent(query) + '&key=' + encodeURIComponent(YOUTUBE_API_KEY);

        fetch(url).then(res => res.json()).then(data => {
            if (myToken !== ytSearchToken) return;

            if (data && data.error) {
                console.warn('[YouTube検索] APIエラー:', data.error);
                return;
            }

            const first = data && data.items && data.items[0];
            const videoId = first && first.id && first.id.videoId;
            if (videoId) {
                try { localStorage.setItem(cacheKey, JSON.stringify({ videoId: videoId })); } catch (e) {}
                embedYouTubeVideo(videoId, myToken);
            } else {
                try { localStorage.setItem(cacheKey, JSON.stringify({ videoId: null })); } catch (e) {}
            }
        }).catch(err => {
            console.warn('[YouTube検索] 通信エラー:', err);
        });
    }

    function embedYouTubeVideo(videoId, myToken) {
        if (myToken !== ytSearchToken) return;

        if (!ytIframeApiReady || typeof YT === 'undefined' || !YT.Player) {
            setTimeout(() => embedYouTubeVideo(videoId, myToken), 300);
            return;
        }

        const wrapper = document.getElementById('yt-embed-wrapper');
        const fallback = document.getElementById('yt-container');
        const playerHost = document.getElementById('yt-player-el');
        if (!wrapper || !playerHost) return;

        if (ytPlayer && typeof ytPlayer.destroy === 'function') {
            try { ytPlayer.destroy(); } catch (e) {}
            ytPlayer = null;
        }
        playerHost.innerHTML = '';
        const innerDiv = document.createElement('div');
        innerDiv.id = 'yt-player-el-inner';
        playerHost.appendChild(innerDiv);

        ytPlayer = new YT.Player('yt-player-el-inner', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: { playsinline: 1, rel: 0, origin: window.location.origin },
            events: {
                onError: (e) => {
                    console.warn('[YouTube埋め込み再生エラー] code:', e.data, '→ 外部起動カードへ切り替えます');
                    destroyYTPlayer();
                }
            }
        });

        if (myToken !== ytSearchToken) { destroyYTPlayer(); return; }

        wrapper.classList.remove('hidden');
        if (fallback) fallback.classList.add('hidden');
    }

    function destroyYTPlayer() {
        if (ytPlayer && typeof ytPlayer.destroy === 'function') {
            try { ytPlayer.destroy(); } catch (e) {}
        }
        ytPlayer = null;
        const wrapper = document.getElementById('yt-embed-wrapper');
        const playerHost = document.getElementById('yt-player-el');
        const fallback = document.getElementById('yt-container');
        if (playerHost) playerHost.innerHTML = '';
        if (wrapper) wrapper.classList.add('hidden');
        if (fallback) fallback.classList.remove('hidden');
    }

    function closeDetailModal() { 
        document.getElementById('modal-detail').classList.remove('active'); 
        stopAudio(); 
        ytSearchToken++; 
        destroyYTPlayer();

        if (currentMode === 'memo') {
            if(currentMemoTab === 'saved') showSavedList();
            else showHistoryList();
        }
    }

    function playYouTubeVideoDirect() {
        if (!currentTrackData) return;
        const cleanTitle = getCleanTitle(currentTrackData.trackName);
        const artist = currentTrackData.artistName;
        const targetUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(cleanTitle + ' ' + artist);
        
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.openWindow({ url: targetUrl, external: true });
        } else {
            window.open(targetUrl, '_blank');
        }
    }

    function openLyricsDirect() {
        if (!currentTrackData) return;
        const cleanTitle = getCleanTitle(currentTrackData.trackName);
        const artist = currentTrackData.artistName;
        const query = `${cleanTitle} ${artist} 歌詞`;
        const targetUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.openWindow({ url: targetUrl, external: true });
        } else {
            window.open(targetUrl, '_blank');
        }
    }

    function searchDAMDirect() {
        if (!currentTrackData) return;
        const cleanTitle = getCleanTitle(currentTrackData.trackName);
        const artist = currentTrackData.artistName;
        const targetUrl = `https://www.clubdam.com/karaokesearch/?keyword=${encodeURIComponent(cleanTitle + ' ' + artist)}&type=keyword`;
        
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.openWindow({ url: targetUrl, external: true });
        } else {
            window.open(targetUrl, '_blank');
        }
    }

    function fetchWikipediaForSong(title) {
        document.getElementById('wiki-song-area').classList.remove('hidden');
        document.getElementById('wiki-song-text').textContent = '読み込み中...';
        document.getElementById('wiki-song-more-btn').classList.add('hidden');
        
        fetchWikiData(title, (text) => {
            if (text && !text.includes("曖昧さ回避")) {
                setupAccordion('wiki-song-text', 'wiki-song-more-btn', text);
            } else {
                fetchWikiData(title + ' (曲)', (text2) => {
                    if (text2) setupAccordion('wiki-song-text', 'wiki-song-more-btn', text2);
                    else document.getElementById('wiki-song-area').classList.add('hidden');
                });
            }
        });
    }

    function fetchWikipediaForArtist(artistName) {
        document.getElementById('wiki-artist-area').classList.remove('hidden');
        document.getElementById('wiki-text').textContent = '読み込み中...';
        document.getElementById('wiki-more-btn').classList.add('hidden');
        document.getElementById('wiki-link').href = '#';

        fetchWikiData(artistName, (text) => {
            if (text) {
                setupAccordion('wiki-text', 'wiki-more-btn', text);
                document.getElementById('wiki-link').href = `https://ja.wikipedia.org/wiki/${encodeURIComponent(artistName)}`;
            } else {
                document.getElementById('wiki-text').textContent = '情報が見つかりませんでした。';
            }
        });
    }

    function fetchWikiData(query, callback) {
        fetch(`https://ja.wikipedia.org/w/api.php?format=json&action=query&prop=extracts&explaintext&redirects=1&titles=${encodeURIComponent(query)}&origin=*&exchars=800`)
            .then(res => res.json())
            .then(data => {
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                if (pageId !== "-1" && pages[pageId].extract) callback(pages[pageId].extract);
                else callback(null);
            }).catch(() => callback(null));
    }

    function setupAccordion(textId, btnId, fullText) {
        const textEl = document.getElementById(textId);
        const btnEl = document.getElementById(btnId);
        
        textEl.textContent = fullText;
        textEl.classList.add('line-clamp-5');
        
        setTimeout(() => {
            if (textEl.scrollHeight > textEl.clientHeight) {
                btnEl.classList.remove('hidden');
                btnEl.textContent = '▼ 続きを読む';
                btnEl.onclick = () => {
                    const isExpanded = !textEl.classList.contains('line-clamp-5');
                    if (isExpanded) {
                        textEl.classList.add('line-clamp-5');
                        btnEl.textContent = '▼ 続きを読む';
                    } else {
                        textEl.classList.remove('line-clamp-5');
                        btnEl.textContent = '▲ 閉じる';
                    }
                };
            }
        }, 50);
    }

    function getMemoList() { try { return JSON.parse(localStorage.getItem('merodata_memos')) || []; } catch(e) { return []; } }
    function getViewHistory() { try { return JSON.parse(localStorage.getItem('merodata_history')) || []; } catch(e) { return []; } }
    
    // 保存リストの最大件数は厳格に10件制限。11件目の時は最も古い記録を自動削除
    function toggleMemo() {
        if (!currentTrackData) return;
        let memos = getMemoList();
        const idx = memos.findIndex(m => m.trackId === currentTrackData.trackId);
        if (idx >= 0) {
            memos.splice(idx, 1);
        } else {
            memos.unshift(currentTrackData);
            if (memos.length > 10) {
                memos.pop(); 
            }
        }
        localStorage.setItem('merodata_memos', JSON.stringify(memos));
        updateMemoIcon(currentTrackData.trackId);
    }
    
    function removeMemo(trackId) {
        let memos = getMemoList();
        memos = memos.filter(m => m.trackId !== trackId);
        localStorage.setItem('merodata_memos', JSON.stringify(memos));
        if (currentMode === 'memo' && currentMemoTab === 'saved') {
            showSavedList();
        }
        showToast("削除しました");
    }
    
    function updateMemoIcon(trackId) {
        const icon = document.getElementById('icon-modal-memo');
        if (getMemoList().find(m => m.trackId === trackId)) { icon.textContent = 'favorite'; icon.classList.add('text-red-500'); }
        else { icon.textContent = 'favorite_border'; icon.classList.remove('text-red-500'); }
    }

    // 閲覧履歴の最大保存件数も厳格に10件に制限
    function saveViewHistory(item) {
        let history = getViewHistory();
        history = history.filter(h => h.trackId !== item.trackId); 
        history.unshift(item); 
        if (history.length > 10) {
            history.pop(); 
        }
        localStorage.setItem('merodata_history', JSON.stringify(history));
    }

    function showSavedList() {
        currentMemoTab = 'saved';
        document.getElementById('btn-toggle-saved').className = 'bg-violet-50 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-bold border border-indigo-300 flex items-center shadow transition-all duration-150';
        document.getElementById('btn-toggle-history').className = 'bg-white/15 text-indigo-100 px-3 py-1.5 rounded-lg text-sm border border-transparent flex items-center transition-all duration-150';
        
        allFetchedResults = getMemoList();
        displayResults = [...allFetchedResults];
        
        document.getElementById('result-count-simple').textContent = `保存: ${displayResults.length}件`;
        document.getElementById('result-count-accordion').textContent = `保存: ${displayResults.length}件`;
        
        clearResults();
        if(displayResults.length === 0) {
            document.getElementById('results-container').innerHTML = '<div class="text-center p-8 text-gray-500">保存された曲はありません。</div>';
        } else {
            loadMoreRender();
        }
    }

    function showHistoryList() {
        currentMemoTab = 'history';
        document.getElementById('btn-toggle-saved').className = 'bg-white/15 text-indigo-100 px-3 py-1.5 rounded-lg text-sm border border-transparent flex items-center transition-all duration-150';
        document.getElementById('btn-toggle-history').className = 'bg-violet-50 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-bold border border-indigo-300 flex items-center shadow transition-all duration-150';
        
        allFetchedResults = getViewHistory();
        displayResults = [...allFetchedResults];
        
        document.getElementById('result-count-simple').textContent = `履歴: ${displayResults.length}件`;
        document.getElementById('result-count-accordion').textContent = `履歴: ${displayResults.length}件`;
        
        clearResults();
        if(displayResults.length === 0) {
            document.getElementById('results-container').innerHTML = '<div class="text-center p-8 text-gray-500">閲覧履歴はありません。</div>';
        } else {
            loadMoreRender();
        }
    }

    function getSearchHistoriesKey(mode) {
        if (mode === 'artist-songs' || mode === 'album-tracks') return 'merodata_search_history_song';
        return `merodata_search_history_${mode}`;
    }

    function getSearchHistories() {
        const key = getSearchHistoriesKey(currentMode);
        try { return JSON.parse(localStorage.getItem(key)) || []; } catch(e) { return []; }
    }

    function saveSearchHistory(query) {
        if(!query) return;
        const key = getSearchHistoriesKey(currentMode);
        let history = getSearchHistories();
        history = history.filter(h => h !== query);
        history.unshift(query);
        if(history.length > 5) history.pop();
        localStorage.setItem(key, JSON.stringify(history));
    }

    function loadSearchHistory() {
        const container = document.getElementById('search-history-container');
        if(!container) return;
        const histories = getSearchHistories();
        if(histories.length > 0) {
            container.innerHTML = histories.map(h => `<button onclick="executeSearch(true, '${h.replace(/'/g, "\\'")}')" class="bg-white border border-indigo-200 text-indigo-700 text-xs px-2 py-1 rounded-full whitespace-nowrap active:bg-indigo-50 shadow-sm">${h}</button>`).join('');
            container.classList.remove('hidden');
        } else {
            container.innerHTML = '';
            container.classList.add('hidden');
        }
    }

    function fetchJSONP(url, callback) {
        const cbName = 'jsonp_cb_' + Math.round(100000 * Math.random());
        window[cbName] = (data) => { delete window[cbName]; document.body.removeChild(script); callback(data); };
        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        script.onerror = () => { isFetching = false; document.getElementById('loading-indicator').style.display = 'none'; showToast("通信エラーが発生しました"); };
        document.body.appendChild(script);
    }

    function fetchJSONPSilent(url, callback, onError) {
        const cbName = 'jsonp_cb_' + Math.round(100000 * Math.random()) + '_' + Date.now();
        let settled = false;
        const script = document.createElement('script');
        const cleanup = () => { delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); };
        window[cbName] = (data) => {
            if (settled) return;
            settled = true;
            cleanup();
            callback(data);
        };
        script.onerror = () => {
            if (settled) return;
            settled = true;
            cleanup();
            if (onError) onError();
        };
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        document.body.appendChild(script);
    }

    function startVoiceInput() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showToast('音声入力未対応 of browser');
            return;
        }
        const rec = new SpeechRecognition();
        rec.lang = 'ja-JP';
        rec.onresult = (e) => { 
            const transcript = e.results[0][0].transcript;
            document.getElementById('search-input').value = transcript; 
            executeSearch(true); 
        };
        rec.start();
    }
</script>
