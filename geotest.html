<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>近くのカラオケ設置店</title>
  <style>
    :root {
      --primary-color: #ff5a5f;
      --bg-color: #f7f8fa;
      --card-bg: #ffffff;
      --text-color: #333333;
      --sub-text: #666666;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.3rem;
      color: var(--primary-color);
    }

    .status-msg {
      text-align: center;
      font-size: 0.85rem;
      margin: 12px 0 16px 0;
      color: var(--sub-text);
    }

    .error-msg {
      color: #d9534f;
      font-weight: bold;
    }

    .shop-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 店舗カード（枠全体をリンク化） */
    .shop-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: background-color 0.15s ease;
    }

    .shop-card:active {
      background-color: #f0f0f0;
    }

    .shop-thumb {
      width: 85px;
      height: 85px;
      object-fit: cover;
      border-radius: 8px;
      background-color: #eee;
      flex-shrink: 0;
    }

    .shop-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0; /* テキスト溢れ防止 */
    }

    .shop-genre {
      font-size: 0.72rem;
      color: var(--primary-color);
      font-weight: bold;
    }

    .shop-name {
      font-size: 0.98rem;
      font-weight: bold;
      margin: 2px 0 4px 0;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shop-access {
      font-size: 0.78rem;
      color: var(--sub-text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .shop-desc {
      font-size: 0.78rem;
      color: #555;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      padding-bottom: 20px;
      font-size: 0.75rem;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎤 近くのカラオケ設置店</h1>
  </header>

  <div id="status" class="status-msg">位置情報を取得中...</div>

  <div id="shop-container" class="shop-list"></div>

  <footer>
    <p>Powered by <a href="http://webservice.recruit.co.jp/" target="_blank" rel="noopener">ホットペッパー Webサービス</a></p>
  </footer>

  <script>
    const API_KEY = '1c29d09807b9c254';

    // 画面読み込み時に自動実行
    window.addEventListener('DOMContentLoaded', () => {
      getLocationAndSearch();
    });

    function getLocationAndSearch() {
      const statusEl = document.getElementById('status');
      const containerEl = document.getElementById('shop-container');

      if (!navigator.geolocation) {
        statusEl.innerHTML = '<span class="error-msg">お使いのブラウザは位置情報に対応していません。</span>';
        return;
      }

      statusEl.textContent = '位置情報を取得中...';
      containerEl.innerHTML = '';

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          statusEl.textContent = '近くの店舗を検索中...';
          fetchShops(lat, lng);
        },
        (error) => {
          let msg = '位置情報の取得に失敗しました。';
          if (error.code === error.PERMISSION_DENIED) {
            msg = '位置情報の利用が許可されていません。ブラウザの位置情報許可をご確認ください。';
          }
          statusEl.innerHTML = `<span class="error-msg">${msg}</span>`;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    async function fetchShops(lat, lng) {
      const statusEl = document.getElementById('status');

      // range=5: 3000m (3km) 以内
      // count=10: 最大10件
      // order=4 : 現在地から近い順
      const targetApiUrl = `https://webservice.recruit.co.jp/hotpepper/gourmet/v1/?key=${API_KEY}&lat=${lat}&lng=${lng}&range=5&karaoke=1&order=4&count=10&format=json`;
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetApiUrl)}`;

      try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }
        const data = await response.json();
        renderResults(data);
      } catch (error) {
        console.error(error);
        statusEl.innerHTML = '<span class="error-msg">APIからのデータ取得に失敗しました。</span>';
      }
    }

    function renderResults(data) {
      const statusEl = document.getElementById('status');
      const containerEl = document.getElementById('shop-container');

      if (!data.results || !data.results.shop || data.results.shop.length === 0) {
        statusEl.textContent = '3km以内にカラオケがあるお店は見つかりませんでした。';
        return;
      }

      const total = data.results.results_returned;
      statusEl.textContent = `近くのカラオケ設置店 (${total}件)`;

      data.results.shop.forEach(shop => {
        const photoUrl = shop.photo?.mobile?.l || shop.logo_image || '';
        const genreName = shop.genre?.name || '飲食店';
        const station = shop.station_name ? `${shop.station_name}駅` : '';
        const mobileAccess = shop.mobile_access || shop.address || '';
        const catchText = shop.catch || '';
        const url = shop.urls?.pc || '#';

        // 枠全体をリンクカード化
        const card = document.createElement('a');
        card.className = 'shop-card';
        card.href = url;
        card.target = '_blank';
        card.rel = 'noopener';

        card.innerHTML = `
          <img class="shop-thumb" src="${photoUrl}" alt="${shop.name}" onerror="this.src='https://via.placeholder.com/85?text=No+Image'">
          <div class="shop-info">
            <span class="shop-genre">${genreName} ${station ? '• ' + station : ''}</span>
            <h2 class="shop-name">${shop.name}</h2>
            <p class="shop-access">📍 ${mobileAccess}</p>
            ${catchText ? `<p class="shop-desc">${catchText}</p>` : ''}
          </div>
        `;
        containerEl.appendChild(card);
      });
    }
  </script>
</body>
</html>
