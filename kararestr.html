<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>近くのカラオケ設置店 | メロ出〜た</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
    html, body { margin: 0; padding: 0; background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Sans", "Yu Gothic", sans-serif; }
    .screen-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; background-color: #f3f4f6; max-width: 600px; margin: 0 auto; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    .top-header { background-color: #5a5ce6; color: white; padding: 2rem 1.5rem 2rem 1.5rem; text-align: center; border-bottom-left-radius: 1.5rem; border-bottom-right-radius: 1.5rem; margin-bottom: 1rem; position: relative; flex-shrink: 0; }
    .scrollable-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
    .fab-back { position: absolute; bottom: 20px; left: 20px; width: 60px; height: 60px; background-color: #ff9999; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 50; }
    .shop-card { background: #ffffff; border-radius: 1rem; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); display: flex; gap: 12px; text-decoration: none; color: inherit; transition: background-color 0.15s ease; }
    .shop-card:active { background-color: #f7f7fb; }
    .shop-thumb { width: 85px; height: 85px; object-fit: cover; border-radius: 0.75rem; background-color: #eee; flex-shrink: 0; }
</style>
</head>
<body>

<div class="screen-container">
    <div class="top-header shadow-md">
        <h1 class="text-2xl font-bold tracking-wider flex items-center justify-center mb-1 mt-2 font-sans">
            <span class="material-icons text-2xl mr-2">place</span> 近くのカラオケ設置店
        </h1>
        <div id="status" class="text-[13px] text-indigo-100 opacity-90 mt-2">位置情報を取得中...</div>
    </div>

    <div class="scrollable-content px-4">
        <div id="shop-container" class="flex flex-col gap-3"></div>

        <p class="text-center text-[11px] text-gray-400 mt-6">
            Powered by <a href="http://webservice.recruit.co.jp/" target="_blank" rel="noopener" class="underline">ホットペッパー Webサービス</a>
        </p>
    </div>

    <!-- 左下の戻るボタン（トップページへ） -->
    <button onclick="location.href='./index.html'" class="fab-back">
        <span class="material-icons text-3xl">arrow_back</span>
    </button>
</div>

<script>
    const API_KEY = '1c29d09807b9c254';

    window.addEventListener('DOMContentLoaded', () => {
        getLocationAndSearch();
    });

    function getLocationAndSearch() {
        const statusEl = document.getElementById('status');
        const containerEl = document.getElementById('shop-container');

        if (!navigator.geolocation) {
            statusEl.innerHTML = '<span class="text-red-200 font-bold">お使いのブラウザは位置情報に対応していません。</span>';
            return;
        }

        statusEl.textContent = '位置情報を取得中...';
        containerEl.innerHTML = '';

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                statusEl.textContent = '近くの店舗を検索・並び替え中...';
                fetchShops(lat, lng);
            },
            (error) => {
                let msg = '位置情報の取得に失敗しました。';
                if (error.code === error.PERMISSION_DENIED) {
                    msg = '位置情報の利用が許可されていません。設定をご確認ください。';
                }
                statusEl.innerHTML = `<span class="text-red-200 font-bold">${msg}</span>`;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    // 2点間の直線距離（メートル）を計算する関数
    function calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000; // 地球の半径(m)
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) * Math.sin(dLng / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return Math.round(R * c); // メートル単位で四捨五入
    }

    async function fetchShops(userLat, userLng) {
        const statusEl = document.getElementById('status');

        // 距離順ソートのため、まず3km以内（range=5）の店舗を多め（count=100）に取得
        const targetApiUrl = `https://webservice.recruit.co.jp/hotpepper/gourmet/v1/?key=${API_KEY}&lat=${userLat}&lng=${userLng}&range=5&karaoke=1&count=100&format=json`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetApiUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) {
                throw new Error(`HTTP Error: ${response.status}`);
            }
            const data = await response.json();

            if (!data.results || !data.results.shop || data.results.shop.length === 0) {
                statusEl.textContent = '3km以内にカラオケがあるお店は見つかりませんでした。';
                return;
            }

            // 各店舗の距離を計算してプロパティに追加
            const shops = data.results.shop.map(shop => {
                const distance = calculateDistance(userLat, userLng, shop.lat, shop.lng);
                return { ...shop, distance };
            });

            // 距離が短い順（近い順）に並び替え
            shops.sort((a, b) => a.distance - b.distance);

            // 先頭10件のみ切り出して表示
            const top10Shops = shops.slice(0, 10);
            renderResults(top10Shops, shops.length);

        } catch (error) {
            console.error(error);
            statusEl.innerHTML = '<span class="text-red-200 font-bold">APIからのデータ取得に失敗しました。</span>';
        }
    }

    function renderResults(shops, totalFound) {
        const statusEl = document.getElementById('status');
        const containerEl = document.getElementById('shop-container');

        statusEl.textContent = `近くのカラオケ設置店 (${shops.length}件表示 / 全${totalFound}件)`;

        shops.forEach(shop => {
            const photoUrl = shop.photo?.mobile?.l || shop.logo_image || '';
            const genreName = shop.genre?.name || '飲食店';
            const station = shop.station_name ? `${shop.station_name}駅` : '';
            const mobileAccess = shop.mobile_access || shop.address || '';
            const catchText = shop.catch || '';
            const url = shop.urls?.pc || '#';

            // 距離の表示テキスト（1000m未満はm表記、1km以上はkm表記）
            const distanceStr = shop.distance < 1000
                ? `現在地から約${shop.distance}m`
                : `現在地から約${(shop.distance / 1000).toFixed(1)}km`;

            const card = document.createElement('a');
            card.className = 'shop-card';
            card.href = url;
            card.target = '_blank';
            card.rel = 'noopener';

            card.innerHTML = `
                <img class="shop-thumb" src="${photoUrl}" alt="${shop.name}" onerror="this.src='https://via.placeholder.com/85?text=No+Image'">
                <div class="flex-1 flex flex-col justify-center min-w-0">
                    <span class="text-[11px] font-bold text-[#5a5ce6]">${genreName} ${station ? '• ' + station : ''}（${distanceStr}）</span>
                    <h2 class="text-[15px] font-bold my-0.5 leading-tight whitespace-nowrap overflow-hidden text-ellipsis">${shop.name}</h2>
                    <p class="text-[12px] text-gray-500 mb-0.5 leading-tight">📍 ${mobileAccess}</p>
                    ${catchText ? `<p class="text-[12px] text-gray-600 leading-tight" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${catchText}</p>` : ''}
                </div>
            `;
            containerEl.appendChild(card);
        });
    }
</script>
</body>
</html>
